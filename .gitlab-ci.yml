variables:
  GIT_CLEAN_FLAGS: none

stages:
  - build
  - test
  - publish

build:
  tags: ["upgraide-v2"]
  stage: build
  before_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules dist"
  script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app node:22-alpine sh -c "npm ci && npm run build"
  after_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules"
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

test:unit:
  tags: ["upgraide-v2"]
  stage: test
  needs: [build]
  before_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules"
  script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app node:22-alpine sh -c "node --test dist/__tests__/*.test.js"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

test:typecheck:
  tags: ["upgraide-v2"]
  stage: test
  needs: [build]
  before_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules"
  script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app node:22-alpine sh -c "npm ci && npm run typecheck"
  after_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

publish:
  tags: ["upgraide-v2"]
  stage: publish
  needs: [build, test:unit, test:typecheck]
  before_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules"
  script:
    - |
      docker run --rm -v $CI_PROJECT_DIR:/app -w /app node:22-alpine sh -c "
        npm ci --omit=dev
        echo '@diskd:registry=https://gitlab.iosya.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/' > .npmrc
        echo '//gitlab.iosya.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}' >> .npmrc
        npm publish
      "
  after_script:
    - docker run --rm -v $CI_PROJECT_DIR:/app -w /app alpine sh -c "rm -rf node_modules"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
